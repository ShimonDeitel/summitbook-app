name: SummitBook
options:
  bundleIdPrefix: com.shimondeitel.summitbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SummitBook:
    type: application
    platform: iOS
    sources:
      - path: SummitBook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.summitbook
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SummitBook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SummitBookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SummitBookTests
      - path: SummitBook.storekit
    dependencies:
      - target: SummitBook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.summitbook.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SummitBookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SummitBookUITests
    dependencies:
      - target: SummitBook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.summitbook.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SummitBook:
    build:
      targets:
        SummitBook: all
        SummitBookTests: [test]
        SummitBookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SummitBook.storekit
    test:
      config: Debug
      storeKitConfiguration: SummitBook.storekit
      targets:
        - SummitBookTests
        - SummitBookUITests
    archive:
      config: Release
